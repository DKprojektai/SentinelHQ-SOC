# SentinelHQ — Agent isolation configuration
# Deployed via Wazuh group shared files

# Velociraptor forensics port (leave empty to disable)
VELOCIRAPTOR_PORT=8000

# DNS server IP (leave empty to block DNS during isolation)
# Jei hostname'ai ossec.conf — nurodyti DNS serverio IP kad galėtų resolveinti
# Jei visi adresai jau IP — galima palikti tuščia
DNS_SERVER=
