<ossec_config>
  <!-- SentinelHQ: Host isolation via active response -->
  <!-- sentinelhq-isolation -->
  <active-response>
    <command>route-null</command>
    <location>local</location>
    <timeout>3600</timeout>
  </active-response>
  <active-response>
    <command>netsh</command>
    <location>local</location>
    <timeout>3600</timeout>
  </active-response>
</ossec_config>
